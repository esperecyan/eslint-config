on:
    release:
        types: [ published ]

jobs:
    publish:
        timeout-minutes: 5
        permissions:
            contents: read
            id-token: write
        runs-on: ubuntu-24.04
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                node-version: '24'
                registry-url: https://registry.npmjs.org
            - run: npm publish
              env:
                NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
